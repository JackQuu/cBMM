<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430">
<title>LLM Evaluation Response Matrix</title>
<desc>Response matrix Y: rows are benchmark questions, columns are different LLMs; green denotes a correct answer (+1), red denotes an incorrect answer (-1), and shaded gray denotes a missing entry.</desc>
<style>
  text { font-family: "Helvetica Neue", "Arial", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; fill: #5F5E5A; }
</style>
<defs>
<pattern id="missing" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
<rect width="6" height="6" fill="#F1EFE8"/>
<line x1="0" y1="0" x2="0" y2="6" stroke="#B4B2A9" stroke-width="1.2"/>
</pattern>
</defs>

<!-- Top: column header -->
<text class="th" x="360" y="36" text-anchor="middle">LLM 1, 2, ..., N</text>
<text class="ts" x="360" y="54" text-anchor="middle" fill="#888780">Different large language models</text>

<!-- Left: row header -->
